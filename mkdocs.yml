site_name: Dr. Gezim Sejdiu
site_description: Tech Lead Data Engineer and Assistant Professor of Computer Science
site_url: https://gezimsejdiu.github.io/
repo_url: https://github.com/GezimSejdiu/gezimsejdiu.github.io
repo_name: GezimSejdiu/gezimsejdiu.github.io
copyright: "&copy; 2026, Dr. Gezim Sejdiu"

theme:
  name: material
  language: en
  favicon: https://avatars.githubusercontent.com/u/5259296?v=4
  # Set the color palette and enable the light/dark/system toggle
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      primary: white
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - content.tabs.link 
    - content.code.copy 
    - toc.follow 

plugins:
  - blog:
      blog_dir: blog
      post_dir: "{blog}/posts"
      post_url_date_format: yyyy
      post_url_format: "posts/{file}"
      pagination_per_page: 5
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GezimSejdiu
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/gezim-sejdiu-08b1761b/
      name: LinkedIn
    - icon: fontawesome/brands/google-scholar
      link: https://scholar.google.com/citations?user=Lpbwr9oAAAAJ&hl=en
      name: Google Scholar
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/Gezim_Sejdiu
      name: X

extra_css:
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/profile-card.js

nav:
  - Home: index.md
  - Projects: projects.md
  - Teaching: teaching.md
  - Publications: publications.md
  - Activities: activities.md
  - Blog: blog/index.md
  - CV: cv.md
